keys:
  # Your personal development key (stored in 1Password)
  - &workstation age1yourworkstationkeyhere...
  
  # Your production server's host key
  - &server1     age1yourserversshkeyhere...

creation_rules:
  - path_regex: secrets/[^/]+\.yaml$
    key_groups:
      - age:
          - *workstation
          - *server1
